{% extends "base.html" %}
{% load static %}
{% block title %}Voter Login — EVS{% endblock %}

{% block extra_css %}
<style>
    .errorlist { display: none; }
</style>
{% endblock %}

{% block content %}
<div class="card">
    <h1>Login to Vote</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Continue</button>
    </form>
</div>
{% endblock %}

{% block extra_js %}
{{ form.errors|json_script:"form-errors" }}
<script src="{% static 'voting/scripts.js' %}"></script>
{% endblock %}
